# Dev overrides. Applied automatically on: docker compose up
# Strategy:
#   - Infrastructure (postgres, redis, pgadmin) runs in Docker
#   - API runs in Docker from compiled image (no source volume mount)
#   - For hot reload: run API locally via `dotnet watch` (see README)

services:

  postgres:
    environment:
      POSTGRES_USER:     messenger
      POSTGRES_PASSWORD: messenger_dev
      POSTGRES_DB:       messenger
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    command: >
      redis-server
        --appendonly yes
        --requirepass redis_dev
        --loglevel debug
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    environment:
      ASPNETCORE_ENVIRONMENT:             Development
      ASPNETCORE_HTTP_PORTS:              "8080"
      ASPNETCORE_URLS:                    "http://+:8080"
      ConnectionStrings__MessengerDb:     "Host=postgres;Port=5432;Database=messenger;Username=messenger;Password=messenger_dev;Include Error Detail=true"
      Redis__ConnectionString:            "redis:6379,password=redis_dev,abortConnect=false"
      Jwt__SecretKey:                     "dev-secret-key-minimum-256-bits-long-replace-in-prod"
      FileStorage__Type:                  Local
      FileStorage__Local__BasePath:       /app/uploads
      # Реальные значения — из .env (не коммитится), пусто по умолчанию:
      # appsettings.Development.json больше не хранит боевой ключ Resend
      Resend__ApiKey:                     ${RESEND_API_KEY:-}
      Resend__FromEmail:                  ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      TwoFactor__Enabled:                 ${TWO_FACTOR_ENABLED:-false}
      PasswordReset__Enabled:             ${PASSWORD_RESET_ENABLED:-true}
    ports:
      - "${API_PORT:-8080}:8080"

  pgadmin:
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin

  # Frontend в dev не запускается через Docker — используй: cd frontend && npm run dev
  # Vite proxy (/api, /hubs) автоматически перенаправляет на http://localhost:8080

volumes:
  nuget_cache:
    driver: local
