# Полностью отдельная локальная копия для разработки — свои контейнеры/порты/БД,
# не пересекается с уже запущенным стеком (docker-compose.tunnel.yml).

services:
  postgres:
    container_name: messenger-local-postgres

  redis:
    container_name: messenger-local-redis

  pgadmin:
    container_name: messenger-local-pgadmin

  api:
    container_name: messenger-local-api

  frontend:
    container_name: messenger-local-frontend
    ports:
      - "${FRONTEND_PORT:-5174}:80"
