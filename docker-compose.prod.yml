# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Production: без pgAdmin, с лимитами ресурсов, read-only контейнеры

services:

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M
    environment:
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    # pgAdmin отключён в prod
    healthcheck:
      start_period: 60s

  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 400mb
        --maxmemory-policy allkeys-lru
        --bind 0.0.0.0
        --protected-mode yes
        --loglevel notice
    # Не пробрасываем порт Redis наружу в prod
    ports: !reset []

  api:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 256M
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    # healthcheck для load balancer — wget, не curl: в runtime-образе (aspnet:9.0,
    # debian-slim) curl не установлен, только wget, см. базовый healthcheck в docker-compose.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Наружу торчит только Caddy — API снаружи напрямую не нужен, всё идёт
    # через frontend-nginx (/api, /hubs), который проксирует Caddy
    ports: !reset []

  frontend:
    restart: always
    # Наружу торчит только Caddy (терминирует TLS) — сам frontend доступен
    # только по внутренней docker-сети
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    container_name: messenger-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - messenger-network

  # pgAdmin полностью убран в prod
  pgadmin:
    deploy:
      replicas: 0

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
